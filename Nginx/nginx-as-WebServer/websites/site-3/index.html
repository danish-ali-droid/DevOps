<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Website 3 - Travel Diaries</title>
    <style>
        body {
            font-family: 'Trebuchet MS', sans-serif;
            margin: 0;
            padding: 50px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 10px;
        }
        h1 { font-size: 48px; }
        .info { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 5px; margin-top: 20px; }
        .destinations {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .destination {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 5px;
            margin: 10px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Travel Diaries</h1>
        <p>Welcome to Website 3 - Explore amazing destinations</p>
        <div class="info">
            <strong>Server:</strong> Nginx Web Server<br>
            <strong>Port:</strong> 8083<br>
            <strong>Website:</strong> Travel Diaries
        </div>
        <div class="destinations">
            <div class="destination">
                <h3>Switzerland</h3>
                <p>Alps and beautiful lakes</p>
            </div>
            <div class="destination">
                <h3>Maldives</h3>
                <p>Crystal clear waters</p>
            </div>
            <div class="destination">
                <h3>New York</h3>
                <p>The city that never sleeps</p>
            </div>
            <div class="destination">
                <h3>Japan</h3>
                <p>Rich culture and technology</p>
            </div>
        </div>
    </div>
</body>
</html>
