server {
    listen 8083;
    listen [::]:8083;
    
    server_name localhost site3.local;
    
    root /home/danish-ali/DevOps/Nginx/nginx-as-WebServer/websites/site-3;
    index index.html;
    
    location / {
        try_files $uri $uri/ =404;
    }
    
   
    access_log /var/log/nginx/site3-access.log;
    error_log /var/log/nginx/site3-error.log;
}
