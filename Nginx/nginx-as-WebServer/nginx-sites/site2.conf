server {
    listen 8082;
    listen [::]:8082;
    
    server_name localhost site2.local;
    
    root /home/danish-ali/DevOps/Nginx/nginx-as-WebServer/websites/site-2;
    index index.html;
    
    location / {
        try_files $uri $uri/ =404;
    }
    

    access_log /var/log/nginx/site2-access.log;
    error_log /var/log/nginx/site2-error.log;
}
